# ═══════════════════════════════════════════════════════════════
# render.yaml — Render.com Infrastructure as Code
# Deploy everything FREE: Backend + AI Service + PostgreSQL
# ═══════════════════════════════════════════════════════════════

databases:
  - name: droneos-db
    databaseName: dronedb
    user: droneos
    plan: free
    region: oregon

services:

  # ── Spring Boot Backend (Docker) ──────────────────────────────
  - type: web
    name: droneos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: droneos-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: droneos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: droneos-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://droneos.vercel.app

  # ── Python AI Service ─────────────────────────────────────────
  - type: web
    name: droneos-ai
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60 --access-logfile - app:app
    rootDir: ai-service
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ALLOWED_ORIGINS
        value: https://droneos.vercel.app
