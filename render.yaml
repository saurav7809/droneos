# ═══════════════════════════════════════════════════════════════
# render.yaml — Render.com Infrastructure as Code
# Deploy everything FREE: Backend + AI Service + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════════════

databases:
  - name: droneos-db
    databaseName: dronedb
    user: droneos
    plan: free          # Free 90-day PostgreSQL (256 MB)
    region: oregon      # or frankfurt for India-closer

services:

  # ── Spring Boot Backend ───────────────────────────────────────
  - type: web
    name: droneos-backend
    runtime: java
    plan: free          # 512 MB RAM, sleeps after 15 min idle
    region: oregon
    buildCommand: |
      mvn clean package -DskipTests -q
    startCommand: |
      java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 \
           -Djava.security.egd=file:/dev/./urandom \
           -Dspring.profiles.active=prod \
           -jar target/drone-backend-1.0.0.jar
    rootDir: backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: droneos-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: droneos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: droneos-db
          property: password
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: AI_SERVICE_URL
        fromService:
          name: droneos-ai
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOWED_ORIGINS
        value: https://droneos.vercel.app   # Update after Vercel deploy

  # ── Python AI Service ─────────────────────────────────────────
  - type: web
    name: droneos-ai
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: |
      gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 \
               --timeout 60 --access-logfile - app:app
    rootDir: ai-service
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
