# ═══════════════════════════════════════════════════════════════
# render.yaml — Render.com Infrastructure as Code
# Deploys: PostgreSQL + Backend + AI Service + Frontend
#
# One-click deploy:
#   1. Push this repo to GitHub
#   2. Go to https://render.com/deploy and import the repo
#   3. Render reads this file and wires everything up automatically
#
# Free-tier notes:
#   - Services spin down after 15 min of inactivity (free plan)
#   - PostgreSQL free tier expires after 90 days; upgrade to retain data
#   - Build times are longer on free; first deploy takes ~5 min
# ═══════════════════════════════════════════════════════════════

databases:
  - name: droneos-db
    databaseName: dronedb
    user: droneos
    plan: free
    region: oregon
    postgresMajorVersion: 15

services:

  # ── Spring Boot Backend (Docker) ──────────────────────────────
  - type: web
    name: droneos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── Database connection (wired automatically from droneos-db) ──
      # DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD are injected
      # by Render's Blueprint engine via the fromDatabase references below.
      # If you deployed services manually (not via Blueprint), you MUST
      # set these env vars manually in the Render dashboard:
      #   Dashboard → droneos-backend → Environment → Add Env Var
      - key: DB_HOST
        fromDatabase:
          name: droneos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: droneos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: droneos-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: droneos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: droneos-db
          property: password
      # Auto-generated 256-bit secret — never changes between deploys
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://droneos-frontend.onrender.com,https://droneos-9.onrender.com,http://localhost:3000
      - key: AI_SERVICE_URL
        value: https://droneos-ai.onrender.com

  # ── Python AI Service ─────────────────────────────────────────
  - type: web
    name: droneos-ai
    runtime: python
    plan: free
    region: oregon
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60 --access-logfile - app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Allow requests from both the frontend and the backend
      - key: CORS_ALLOWED_ORIGINS
        value: https://droneos-frontend.onrender.com

  # ── React Frontend (Static Site) ─────────────────────────────
  # Render Static Sites build from source — no Docker, faster and free forever.
  # The _redirects file (frontend/public/_redirects) handles:
  #   - SPA fallback (all routes → index.html)
  #   - /api/* → backend proxy
  #   - /ai/*  → ai-service proxy
  - type: static
    name: droneos-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA fallback — all unmatched routes serve index.html (required for React Router)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Point directly at the live backend — avoids broken proxy redirect for POST/CORS
      - key: VITE_API_BASE_URL
        value: https://droneos-9.onrender.com
      - key: VITE_AI_BASE_URL
        value: https://droneos-ai.onrender.com
      # WebSocket must be absolute (browsers can't proxy WS)
      - key: VITE_WS_BASE_URL
        value: https://droneos-9.onrender.com
