# ═══════════════════════════════════════════════════════════════
# DroneOS — Production Application Configuration
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ═══════════════════════════════════════════════════════════════

spring:
  application:
    name: drone-backend

  # ── PostgreSQL (production) ────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dronedb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: DroneOSPool

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update          # Set to update for initial Render deploy
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true

  # ── Disable H2 console ─────────────────────────────────────
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/javascript,text/css
  error:
    include-stacktrace: never
    include-message: never
  # Security headers from Tomcat
  tomcat:
    max-threads: 200
    accept-count: 100

# ── JWT (override via environment variable!) ───────────────────
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_AT_LEAST_256_BITS_LONG}
  expiration: 86400000   # 24 hours

# ── AI Service ────────────────────────────────────────────────
ai-service:
  url: ${AI_SERVICE_URL:http://ai-service:5000}

# ── Actuator health endpoints (for Render health checks) ──────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      # "always" lets Render's unauthenticated health-check probe see {"status":"UP"}
      # without this the probe gets 401 and Render marks the service as unhealthy
      show-details: always
  health:
    db:
      enabled: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.droneos: INFO
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
