spring:
  application:
    name: drone-backend

  # ── DataSource ───────────────────────────────────────────────
  # Local default: H2 in-memory. On Render, DATABASE_URL overrides this via
  # RenderDatabaseUrlPostProcessor (which also forces the PostgreSQL driver).
  # driver-class-name is intentionally omitted — Spring auto-detects from URL.
  datasource:
    url: jdbc:h2:mem:dronedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        # dialect intentionally omitted — Hibernate auto-detects from the driver
        format_sql: false


server:
  port: 8080

jwt:
  secret: droneos-super-secret-key-minimum-256-bits-long-for-hmac-sha256-dev
  expiration: 86400000

ai-service:
  url: http://localhost:5000

# ── Actuator (health endpoint for Docker health checks) ──────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.droneos: DEBUG
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
