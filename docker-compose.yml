
services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: drone-postgres
    environment:
      POSTGRES_DB: dronedb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drone-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-droneos-super-secret-key-minimum-256-bits-long-for-hmac-sha}
      AI_SERVICE_URL: http://ai-service:5000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dronedb
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Python AI Service ──────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: drone-ai
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drone-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
