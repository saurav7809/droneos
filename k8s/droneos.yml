---
# ═══════════════════════════════════════════════════
# DroneOS Kubernetes Manifests — Production
# Compatible: AWS EKS, GKE, DigitalOcean, AKS
# Deploy: kubectl apply -f k8s/
# ═══════════════════════════════════════════════════

# ── Namespace ──────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: droneos
  labels:
    app.kubernetes.io/name: droneos
    environment: production
---

# ── Secrets (create manually or via Sealed Secrets) 
apiVersion: v1
kind: Secret
metadata:
  name: droneos-secrets
  namespace: droneos
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  JWT_SECRET:  "REPLACE_WITH_64_CHAR_HEX_STRING"
---

# ── ConfigMap ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: droneos-config
  namespace: droneos
data:
  POSTGRES_DB:            dronedb
  DB_USERNAME:            droneos
  SPRING_PROFILES_ACTIVE: prod
  TZ:                     Asia/Kolkata
---

# ═══════════════════════════════════════════════════
# PostgreSQL
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: droneos
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: droneos-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: droneos-config
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: droneos-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "droneos"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: droneos
spec:
  clusterIP: None   # Headless for StatefulSet
  selector:
    app: postgres
  ports:
    - port: 5432
---

# ═══════════════════════════════════════════════════
# Spring Boot Backend
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: droneos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime rolling deploy
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/droneos-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: droneos-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: droneos-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: droneos-secrets
                  key: JWT_SECRET
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/dronedb"
            - name: AI_SERVICE_URL
              value: "http://ai-service:5000"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: droneos
spec:
  selector:
    app: backend
  ports:
    - port: 8080
---

# ═══════════════════════════════════════════════════
# Python AI Service
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: droneos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/YOUR_ORG/droneos-ai:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: droneos
spec:
  selector:
    app: ai-service
  ports:
    - port: 5000
---

# ═══════════════════════════════════════════════════
# React Frontend (Nginx)
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: droneos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/droneos-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: droneos
spec:
  selector:
    app: frontend
  ports:
    - port: 80
---

# ═══════════════════════════════════════════════════
# Ingress (HTTPS with cert-manager)
# ═══════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: droneos-ingress
  namespace: droneos
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  tls:
    - hosts:
        - YOUR_DOMAIN.com
      secretName: droneos-tls
  rules:
    - host: YOUR_DOMAIN.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

# ═══════════════════════════════════════════════════
# Horizontal Pod Autoscaler
# ═══════════════════════════════════════════════════
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: droneos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
